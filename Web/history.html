<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Attendify attendance history and exports.">
  <title>Attendance History | Attendify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/history.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/history.js"></script>
</head>
<body data-page="history">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <a class="sidebar-brand" href="dashboard.html"><img src="assets/logo.png" alt="Attendify logo"><span>Attendify</span></a>
      <nav class="sidebar-nav" aria-label="Primary">
        <a href="dashboard.html" data-nav="dashboard"><i class="fa-solid fa-table-cells-large"></i><span>Dashboard</span></a>
        <a href="class.html" data-nav="class"><i class="fa-solid fa-chalkboard-user"></i><span>Classes</span></a>
        <a href="enroll.html" data-nav="enroll"><i class="fa-solid fa-user-plus"></i><span>Enroll Student</span></a>
        <a href="history.html" data-nav="history"><i class="fa-solid fa-clock-rotate-left"></i><span>Attendance History</span></a>
        <a href="settings.html" data-nav="settings"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
        <a href="profile.html" data-nav="profile"><i class="fa-solid fa-user"></i><span>Profile</span></a>
      </nav>
      <button class="sidebar-logout" type="button" data-action="logout"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Logout</span></button>
    </aside>
    <div class="page-wrap">
      <header class="topbar">
        <button class="icon-button sidebar-toggle" type="button" data-action="toggle-sidebar" aria-label="Open navigation"><i class="fa-solid fa-bars"></i></button>
        <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input id="historySearch" type="search" placeholder="Search student or registration" aria-label="Search attendance history"></div>
        <div class="topbar-meta"><span class="date-chip" data-current-date></span><button class="icon-button" type="button" data-action="notifications" aria-label="Notifications"><i class="fa-regular fa-bell"></i><span class="notification-dot"></span></button><a class="avatar" href="profile.html">AK</a></div>
      </header>
      <main class="content fade-in">
        <section class="page-heading">
          <div><p class="eyebrow">Records and audit trail</p><h1>Attendance History</h1></div>
          <div class="action-row"><button class="button button-secondary" id="exportCsv" type="button"><i class="fa-solid fa-file-csv"></i>Export CSV</button><button class="button button-light" id="printHistory" type="button"><i class="fa-solid fa-print"></i>Print</button></div>
        </section>
        <section class="filter-bar">
          <label>Class<select id="classFilter"><option value="">All classes</option></select></label>
          <label>Date<input id="dateFilter" type="date"></label>
          <label>Student<input id="studentFilter" type="text" placeholder="Student name"></label>
          <label>Status<select id="statusFilter"><option value="">All</option><option>Present</option><option>Absent</option><option>Late</option></select></label>
        </section>
        <section class="section-block">
          <div class="section-header"><div><h2>History</h2><p>Filtered attendance entries from mock JSON data.</p></div><span class="table-count" id="historyCount"></span></div>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Student</th><th>Registration Number</th><th>Date</th><th>Time</th><th>Status</th></tr></thead>
              <tbody id="historyTable"></tbody>
            </table>
          </div>
          <div class="pagination" id="historyPagination"></div>
        </section>
      </main>
    </div>
  </div>
  <div class="toast-region" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
