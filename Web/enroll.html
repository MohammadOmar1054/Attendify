<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Enroll students into Attendify biometric attendance.">
  <title>Enroll Student | Attendify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/forms.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/enroll.js"></script>
</head>
<body data-page="enroll">
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <a class="sidebar-brand" href="dashboard.html"><img src="assets/logo.png" alt="Attendify logo"><span>Attendify</span></a>
      <nav class="sidebar-nav" aria-label="Primary">
        <a href="dashboard.html" data-nav="dashboard"><i class="fa-solid fa-table-cells-large"></i><span>Dashboard</span></a>
        <a href="class.html" data-nav="class"><i class="fa-solid fa-chalkboard-user"></i><span>Classes</span></a>
        <a href="enroll.html" data-nav="enroll"><i class="fa-solid fa-user-plus"></i><span>Enroll Student</span></a>
        <a href="history.html" data-nav="history"><i class="fa-solid fa-clock-rotate-left"></i><span>Attendance History</span></a>
        <a href="settings.html" data-nav="settings"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
        <a href="profile.html" data-nav="profile"><i class="fa-solid fa-user"></i><span>Profile</span></a>
      </nav>
      <button class="sidebar-logout" type="button" data-action="logout"><i class="fa-solid fa-arrow-right-from-bracket"></i><span>Logout</span></button>
    </aside>
    <div class="page-wrap">
      <header class="topbar">
        <button class="icon-button sidebar-toggle" type="button" data-action="toggle-sidebar" aria-label="Open navigation"><i class="fa-solid fa-bars"></i></button>
        <div class="search-box"><i class="fa-solid fa-magnifying-glass"></i><input type="search" placeholder="Search enrollment records" aria-label="Search enrollment records"></div>
        <div class="topbar-meta"><span class="date-chip" data-current-date></span><button class="icon-button" type="button" data-action="notifications" aria-label="Notifications"><i class="fa-regular fa-bell"></i><span class="notification-dot"></span></button><a class="avatar" href="profile.html">AK</a></div>
      </header>
      <main class="content fade-in">
        <section class="page-heading">
          <div><p class="eyebrow">Fingerprint registration</p><h1>Enroll Student</h1></div>
        </section>
        <section class="form-layout">
          <form class="panel-form" id="enrollmentForm">
            <div class="form-grid">
              <div class="form-field"><label for="studentName">Student Name</label><input id="studentName" name="studentName" type="text" value="Ananya Rao" required></div>
              <div class="form-field"><label for="registrationNumber">Registration Number</label><input id="registrationNumber" name="registrationNumber" type="text" value="CS21B1042" required></div>
              <div class="form-field"><label for="department">Department</label><select id="department" name="department"><option>Computer Science</option><option>Electronics</option><option>Information Technology</option></select></div>
              <div class="form-field"><label for="course">Course</label><select id="course" name="course"><option>CS601 - Internet of Things</option><option>CS502 - Database Systems</option><option>EC410 - Embedded Systems</option></select></div>
              <div class="form-field"><label for="semester">Semester</label><select id="semester" name="semester"><option>6</option><option>5</option><option>4</option></select></div>
              <div class="form-field"><label for="section">Section</label><select id="section" name="section"><option>A</option><option>B</option><option>C</option></select></div>
            </div>
            <div class="action-row form-actions">
              <button class="button button-primary" type="submit"><i class="fa-solid fa-fingerprint"></i>Start Enrollment</button>
              <button class="button button-light" type="reset"><i class="fa-solid fa-xmark"></i>Cancel</button>
            </div>
          </form>
          <aside class="enrollment-panel">
            <h2>Enrollment Status</h2>
            <div class="progress-track"><span id="enrollProgress"></span></div>
            <ul class="status-steps" id="enrollSteps"></ul>
          </aside>
        </section>
      </main>
    </div>
  </div>
  <div class="toast-region" aria-live="polite" aria-atomic="true"></div>
</body>
</html>
