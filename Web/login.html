<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to Attendify, a biometric attendance management system.">
  <title>Login | Attendify</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/responsive.css">
  <script type="module" src="js/auth.js"></script>
</head>
<body class="login-page">
  <main class="login-shell">
    <section class="login-brand" aria-label="Attendify overview">
      <img src="assets/logo.png" alt="Attendify logo" class="brand-mark">
      <h1>Attendify</h1>
      <p>Biometric Attendance Management System</p>
      <div class="device-strip" aria-hidden="true">
        <span><i class="fa-solid fa-microchip"></i> ESP32</span>
        <span><i class="fa-solid fa-fingerprint"></i> R307</span>
        <span><i class="fa-solid fa-cloud"></i> Firebase</span>
      </div>
    </section>

    <section class="login-card" aria-labelledby="login-title">
      <div class="card-header">
        <h2 id="login-title">Welcome back</h2>
        <p>Sign in to manage classes, enrollment, and attendance.</p>
      </div>

      <form id="loginForm" class="auth-form" novalidate>
        <div class="form-field">
          <label for="email">Email</label>
          <div class="input-icon">
            <i class="fa-regular fa-envelope" aria-hidden="true"></i>
            <input id="email" name="email" type="email" autocomplete="email" placeholder="lecturer@university.edu" required>
          </div>
          <small class="field-error" data-error-for="email"></small>
        </div>

        <div class="form-field">
          <label for="password">Password</label>
          <div class="input-icon">
            <i class="fa-solid fa-lock" aria-hidden="true"></i>
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Enter password" required>
            <button class="icon-button reveal-password" type="button" aria-label="Show password">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
          <small class="field-error" data-error-for="password"></small>
        </div>

        <div class="form-row between">
          <label class="checkbox-line">
            <input id="remember" name="remember" type="checkbox">
            <span>Remember me</span>
          </label>
          <a href="#" class="text-link" data-action="forgot-password">Forgot password?</a>
        </div>

        <button class="button button-primary button-full" type="submit">
          <i class="fa-solid fa-right-to-bracket"></i>
          Login
        </button>
      </form>

      <footer class="login-footer">
        <p>Biometric Attendance Management System</p>
      </footer>
    </section>
  </main>
</body>
</html>
